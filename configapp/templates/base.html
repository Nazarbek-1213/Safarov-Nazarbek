<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}CV{% endblock %}</title>

  <style>
    :root{
      --bg:#0b0f14;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.04);
      --border: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
      --accent:#5aa7ff;
      --radius: 18px;
      --shadow: 0 10px 35px rgba(0,0,0,.45);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--text);
      background:
        radial-gradient(900px 600px at 20% 10%, rgba(90,167,255,.14), transparent 60%),
        radial-gradient(900px 600px at 80% 30%, rgba(180,120,255,.10), transparent 55%),
        var(--bg);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      overflow-x:hidden;
    }

    /* Layout */
    .app{
      display:grid;
      grid-template-columns: 260px 1fr;
      min-height:100vh;
    }

    /* Sidebar */
    .sidebar{
      position:sticky;
      top:0;
      height:100vh;
      padding:18px 14px;
      border-right:1px solid var(--border);
      background: linear-gradient(to bottom, rgba(255,255,255,.04), rgba(255,255,255,.02));
      backdrop-filter: blur(10px);
    }

    .brand{
      display:flex; align-items:center; gap:12px;
      padding:10px 10px 18px 10px;
      border-bottom:1px solid var(--border);
      margin-bottom:14px;
    }
    .avatar{
      width:44px;height:44px;border-radius:12px;
      background: var(--panel);
      border:1px solid var(--border);
      display:grid;place-items:center;
      font-weight:700;
    }
    .brand .name{font-weight:700}
    .brand .sub{font-size:12px;color:var(--muted)}

    .nav{display:flex;flex-direction:column;gap:10px;margin-top:14px}
    .nav a{
      text-decoration:none;
      color:var(--text);
      background: var(--panel2);
      border:1px solid var(--border);
      padding:10px 12px;
      border-radius:14px;
      display:flex; align-items:center; gap:10px;
      transition:.15s ease;
      user-select:none;
    }
    .nav a:hover{transform:translateY(-1px); box-shadow: var(--shadow)}
    .nav a.active{
      border-color: rgba(90,167,255,.45);
      box-shadow: 0 0 0 3px rgba(90,167,255,.10);
    }
    .ico{width:18px;height:18px;opacity:.9;display:inline-grid;place-items:center}

    .sidebar-bottom{
      position:absolute;
      left:14px; right:14px;
      bottom:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .btn{
      width:100%;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid var(--border);
      background: var(--panel2);
      color:var(--text);
      cursor:pointer;
    }

    /* Main */
    main{
      padding:34px 34px 60px;
    }

    .section{
      padding:22px 0 36px;
    }
    .section h2{
      margin:0 0 18px;
      font-size:34px;
      font-weight:750;
      letter-spacing:.2px;
      text-align:center;
    }
    .section .hr{
      width:64px;height:2px;background:rgba(255,255,255,.18);
      border-radius:99px;margin:0 auto 26px;
    }

    .grid-2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:18px;
      align-items:start;
      max-width: 980px;
      margin: 0 auto;
    }

    .card{
      background: var(--panel);
      border:1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:16px;
      backdrop-filter: blur(12px);
      min-height: 240px;
    }

    .card-title{
      display:flex;align-items:center;gap:10px;
      font-weight:700;
      margin:0 0 12px;
    }
    .badge{
      width:28px;height:28px;border-radius:10px;
      background: rgba(255,255,255,.06);
      border:1px solid var(--border);
      display:grid;place-items:center;
    }

    .list{display:flex;flex-direction:column;gap:12px}
    .item{
      display:flex; gap:12px; align-items:center;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(10,14,20,.35);
    }
    .item img{
      width:42px;height:42px;border-radius:12px;object-fit:cover;
      border:1px solid rgba(255,255,255,.10);
    }
    .item .t{font-weight:650}
    .item .d{font-size:12px;color:var(--muted);margin-top:2px}
    .pill{
      margin-left:auto;
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(90,167,255,.35);
      background: rgba(90,167,255,.10);
      color: rgba(200,230,255,.95);
    }

    /* Scroll to top */
    .to-top{
      position:fixed;
      right:22px;
      bottom:22px;
      width:44px;height:44px;
      border-radius:14px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.06);
      color:var(--text);
      display:grid;place-items:center;
      cursor:pointer;
      opacity:0;
      transform: translateY(8px);
      transition:.2s ease;
    }
    .to-top.show{opacity:1; transform: translateY(0)}

    /* Responsive */
    @media (max-width: 980px){
      .app{grid-template-columns: 1fr}
      .sidebar{
        position:fixed;
        left:0; top:0;
        width: 240px;
        transform: translateX(-105%);
        transition:.2s ease;
        z-index:20;
      }
      .sidebar.open{transform: translateX(0)}
      main{padding:24px 18px}
      .grid-2{grid-template-columns:1fr}
      .mobile-bar{
        position:sticky; top:0;
        z-index:10;
        display:flex; align-items:center; justify-content:space-between;
        gap:10px;
        padding:12px 14px;
        border-bottom:1px solid var(--border);
        background: rgba(0,0,0,.35);
        backdrop-filter: blur(10px);
        border-radius: 0 0 18px 18px;
      }
      .hamb{width:44px;height:44px;border-radius:14px}
    }
    @media (min-width: 981px){
      .mobile-bar{display:none}
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="avatar">M</div>
        <div>
          <div class="name">{{ profile.full_name|default:"Mirshod" }}</div>
          <div class="sub">{{ profile.title|default:"Backend Developer" }}</div>
        </div>
      </div>

      <nav class="nav" id="nav">
        <a href="#home" data-target="home"><span class="ico">🏠</span> Home</a>
        <a href="#experience" data-target="experience"><span class="ico">💼</span> Experience</a>
        <a href="#skills" data-target="skills"><span class="ico">🧠</span> Skills</a>
        <a href="#achievements" data-target="achievements"><span class="ico">🏆</span> Achievements</a>
        <a href="#certificate" data-target="certificate"><span class="ico">📜</span> Certificate</a>
        <a href="#projects" data-target="projects"><span class="ico">🧩</span> Projects</a>
        <a href="#contact" data-target="contact"><span class="ico">✉️</span> Contact</a>
      </nav>

      <div class="sidebar-bottom">
        <button class="btn" id="themeBtn">🌙 Theme</button>
        <button class="btn" id="langBtn">EN</button>
      </div>
    </aside>

    <main>
      <div class="mobile-bar">
        <button class="btn hamb" id="hamb">☰</button>
        <div style="color:var(--muted);font-size:13px">CV / Portfolio</div>
        <div style="width:44px"></div>
      </div>

      {% block content %}{% endblock %}
    </main>
  </div>

  <button class="to-top" id="toTop" title="Top">↑</button>

  <script>
    // Sidebar toggle (mobile)
    const sidebar = document.getElementById('sidebar');
    const hamb = document.getElementById('hamb');
    if (hamb){
      hamb.addEventListener('click', () => sidebar.classList.toggle('open'));
    }
    document.addEventListener('click', (e) => {
      if (window.innerWidth <= 980){
        if (!sidebar.contains(e.target) && e.target !== hamb){
          sidebar.classList.remove('open');
        }
      }
    });

    // Scrollspy active link
    const navLinks = [...document.querySelectorAll('#nav a')];
    const sections = navLinks
      .map(a => document.getElementById(a.dataset.target))
      .filter(Boolean);

    const setActive = (id) => {
      navLinks.forEach(a => a.classList.toggle('active', a.dataset.target === id));
    };

    const io = new IntersectionObserver((entries) => {
      const visible = entries
        .filter(e => e.isIntersecting)
        .sort((a,b) => b.intersectionRatio - a.intersectionRatio)[0];
      if (visible) setActive(visible.target.id);
    }, { rootMargin: "-30% 0px -60% 0px", threshold: [0.1, 0.2, 0.3] });

    sections.forEach(s => io.observe(s));

    // To top button
    const toTop = document.getElementById('toTop');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 600) toTop.classList.add('show');
      else toTop.classList.remove('show');
    });
    toTop.addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));
  </script>
</body>
</html>
